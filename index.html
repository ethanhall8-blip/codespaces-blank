<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UBG4U - Unbanned Games</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-logo">UBG4U</span>
        <p class="brand-tag">Your home for free browser games with instant play and cool thumbnails.</p>
      </div>
    </header>

    <main class="content">
      <section class="intro">
        <p>Welcome to UBG4U — click a game tile, then press fullscreen or open the game in a new tab. New titles are added to keep the arcade fresh.</p>
      </section>

      <section class="games-list">
        <h1>Choose a game</h1>
        <div class="cards">
          <button class="game-card" data-game="games/maze-runner.html">
            <img class="game-thumb" src="images/maze-runner.svg" alt="Maze Runner thumbnail" />
            <div class="card-copy">
              <h2>Maze Runner</h2>
              <p>Race through the maze with arrow keys and reach the star.</p>
            </div>
          </button>
          <button class="game-card" data-game="games/space-shooter.html">
            <img class="game-thumb" src="images/space-shooter.svg" alt="Space Shooter thumbnail" />
            <div class="card-copy">
              <h2>Space Shooter</h2>
              <p>Pilot your ship, shoot enemies, and survive the waves.</p>
            </div>
          </button>
          <button class="game-card" data-game="games/brick-breaker.html">
            <img class="game-thumb" src="images/brick-breaker.svg" alt="Brick Breaker thumbnail" />
            <div class="card-copy">
              <h2>Brick Breaker</h2>
              <p>Bounce the ball, crush bricks, and stay in the game.</p>
            </div>
          </button>
          <button class="game-card" data-game="games/pixel-runner.html">
            <img class="game-thumb" src="images/pixel-runner.svg" alt="Pixel Runner thumbnail" />
            <div class="card-copy">
              <h2>Pixel Runner</h2>
              <p>Dodge obstacles as the runner speeds down the neon track.</p>
            </div>
          </button>
          <button class="game-card" data-game="games/bubble-pop.html">
            <img class="game-thumb" src="images/bubble-pop.svg" alt="Bubble Pop thumbnail" />
            <div class="card-copy">
              <h2>Bubble Pop</h2>
              <p>Click the bubbles before time runs out to earn points.</p>
            </div>
          </button>
        </div>
      </section>

      <section class="game-area">
        <div class="game-header">
          <h2 id="selected-game">Pick a game to load</h2>
          <div>
            <button id="fullscreenBtn" class="action-btn" disabled>Go Fullscreen</button>
            <a id="openTabBtn" class="action-link" href="#" target="_blank" rel="noopener noreferrer">Open in New Tab</a>
          </div>
        </div>
        <div class="game-frame" id="gameFrameContainer">
          <iframe id="gameFrame" src="" title="Game frame"></iframe>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
